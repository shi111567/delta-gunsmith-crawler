name: Daily Gunsmith Crawler

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: npx playwright install chromium --with-deps

      - name: Run crawler
        run: npm run crawl

      - name: Commit and push codes.json
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add codes.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自动更新改枪码 [skip ci]" && git push)
