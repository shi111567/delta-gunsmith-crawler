name: 自动更新改枪码

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update-codes:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4

      - name: 运行爬虫
        run: |
          python gi.githubcrawler.py
          echo "爬虫执行完成"

      - name: 提交更新
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add codes.json budget_loadouts.json 2>/dev/null || echo "没有新文件"
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 自动更新数据 [skip ci]"
          git push
