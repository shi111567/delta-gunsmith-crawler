name: 自动更新改枪码

on:
  schedule:
    - cron: '0 2 * * *'   # 每天凌晨2点运行
  workflow_dispatch:       # 允许手动触发

jobs:
  update-codes:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 运行爬虫
        run: python crawler.py

      - name: 提交更新
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 添加所有可能更新的 JSON 文件
          git add codes.json
          git add budget_loadouts.json 2>/dev/null || echo "budget_loadouts.json 不存在，跳过"
          
          # 检查是否有更改
          if git diff --staged --quiet; then
            echo "没有新的更改，跳过提交"
          else
            git commit -m "🔄 自动更新数据 [skip ci]"
            git push
          fi
